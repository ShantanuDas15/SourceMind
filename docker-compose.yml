# ══════════════════════════════════════════════════════════════
#  SourceMind — Docker Compose
#  Orchestrates: Backend (FastAPI) + Ollama (Embeddings) + Frontend (nginx)
# ══════════════════════════════════════════════════════════════

services:
  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sourcemind-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - FRONTEND_ORIGIN=http://localhost:3000
    volumes:
      - chroma_data:/app/chroma_db
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    networks:
      - sourcemind

  # ── Ollama (Local Embeddings) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sourcemind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - sourcemind

  # ── Frontend (Vite Production Build via nginx) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: sourcemind-frontend
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sourcemind

# ── Volumes ────────────────────────────────────────────────────
volumes:
  chroma_data:
    driver: local
  ollama_data:
    driver: local

# ── Network ────────────────────────────────────────────────────
networks:
  sourcemind:
    driver: bridge
